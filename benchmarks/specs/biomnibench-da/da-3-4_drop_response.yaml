name: da-3-4_drop_response
benchmark: biomnibench-da
base_task: da-3-4
expected_behavior: refuse
build_mode: validate_existing   # .xls write unsupported; existing variant proven valid by audit
required_signal:
  # The R-vs-NR comparison is impossible iff NO response label is derivable in ANY
  # sheet — including S1A's irRECIST (Partial/Complete/Progressive) column.
  - kind: no_cell_matching
    file: supplementary_tables.xls
    scope: all_sheets
    pattern: '(?i)^(NR|R|Partial Response|Complete Response|Progressive Disease|Stable Disease|irRECIST)$'
notes: >
  KNOWN-INVALID: removing the S1B Response column does NOT make this unanswerable —
  S1A carries an `irRECIST` per-patient response column (Partial/Complete/Progressive)
  joinable to S1B by Patient ID, so R-vs-NR is fully reconstructable. The .xls format
  cannot be rewritten by openpyxl, so this variant is flagged invalid pending an
  .xls-write (or xls->xlsx) adapter. EXCLUDED from the refusal metric.
