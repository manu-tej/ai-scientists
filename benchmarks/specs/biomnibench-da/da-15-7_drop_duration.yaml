notes: >
  WHY unanswerable: the rubric scores a transcriptome-wide correlation of gene
  expression against disease_duration (the continuous progression-rate predictor)
  within ALS patients, culminating in CHIT1 as the strongest negatively-correlated
  gene. disease_duration is the sole answer-critical variable and is not re-encoded
  in any sibling column (site_of_motor_onset, age_rounded, subject_group are
  distinct phenotypes). Dropping it from all three regional metadata files removes
  the predictor entirely, so no duration-gene association can be fit in any region.
