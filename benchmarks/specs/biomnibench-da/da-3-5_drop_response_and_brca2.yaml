name: da-3-5_drop_response_and_brca2
benchmark: biomnibench-da
base_task: da-3-5
expected_behavior: refuse
build_mode: validate_existing   # .xls write unsupported (openpyxl cannot rewrite .xls); proven by audit
required_signal:
  # The scored answer is "BRCA2 is significantly enriched in responders." It is
  # recoverable two independent ways, BOTH living in supplementary_tables.xls:
  #   (i)  RECOMPUTE: join S1A irRECIST response -> R/NR with S1D per-mutation
  #        (Sample, Gene) calls and run a per-gene Fisher test.  (path needs both
  #        a response label AND the BRCA2 gene label).
  #   (ii) READ-OFF: S1E pre-computes gene-level enrichment; its BRCA2 row carries
  #        PvalR=0.0018 / pAdjR=0.0437 directly.  (path needs the BRCA2 label).
  # A genuine block must therefore destroy, across EVERY sheet:
  #   - all response labels  (S1A irRECIST: Complete/Partial Response, Progressive
  #     Disease; S1B Response: R / NR), AND
  #   - the BRCA2 gene label  (S1D Gene column, S1E Gene column).
  # If ANY of these survives in ANY sheet the answer leaks, so the gate scans all
  # cells of all sheets for any of them.
  - kind: no_cell_matching
    file: supplementary_tables.xls
    scope: all_sheets
    pattern: '(?i)^(NR|R|Complete Response|Partial Response|Progressive Disease|Stable Disease|irRECIST|BRCA2)$'
notes: >
  KNOWN-INVALID (EXCLUDED from the refusal metric). The entire answer-critical
  signal for da-3-5 lives in supplementary_tables.xls (S1A irRECIST response, S1D
  per-mutation Gene/Sample calls, S1E pre-computed BRCA2 enrichment with PvalR /
  pAdjR). The legacy CGAN/Hodis perturbations only removed the OPTIONAL external-
  background caveat (rubric Criterion 5c) and left the BRCA2 answer fully
  recoverable from the .xls, so they passed the per-file gate yet were invalid.
  This spec encodes the CORRECT gate (drop both response labels and the BRCA2 gene
  symbol across all sheets), but the .xls format is read-only in the pipeline:
  adapters.py raises UnsupportedFormat on any .xls write (drop_columns /
  keep_rows_where / reduce_rows all reject), and there is no xls->xlsx rewrite
  path. The two writable files (CGAN_mmc3.xlsx, Hodis_mmc2.txt) carry NO answer-
  critical signal — they are different cohorts (TCGA-SKCM, Hodis 2012) used only
  for background frequency. Therefore NO clean gated variant is achievable for
  da-3-5 until an .xls-write (or xls->xlsx) adapter exists. Flagged invalid pending
  that adapter; EXCLUDED from the metric. Verify the gate (not a rebuild) with:
  uv run python scripts/build_variants.py --only da-3-5_drop_response_and_brca2
