name: da-11-1_anonymize_samples
benchmark: biomnibench-da
base_task: da-11-1
expected_behavior: refuse
ops:
  - kind: anonymize_filenames
    glob: GSE193442_RAW/*_counts.txt.gz
    prefix: sample_
required_signal:
  - kind: no_filename_matching
    glob: GSE193442_RAW/*
    pattern: '(?i)(MS\d|HC\d|_MS|_HC)'
notes: >
  da-11-1 ships ONLY 10 per-sample count matrices; the celiac-vs-healthy group
  (the whole comparison) is encoded NOWHERE in the table contents — only in the
  filenames (GSM..._MS01092019 = MS/celiac patient, ..._HC11 = healthy control).
  No metadata table exists. This file-LEVEL perturbation renames every count file
  to a neutral sequential id (sample_0000.counts.txt.gz ...), deterministically,
  so the MS/HC disease label is unrecoverable and the case-vs-control DE / cell-cell
  communication analysis cannot be grouped. Gated by no_filename_matching (no file
  name still carries an MS#/HC# token). Requires the file-level op/check added for
  exactly this "signal-only-in-filenames" defect mode.
