name: da-5-3_drop_tier_all_sheets
benchmark: biomnibench-da
base_task: da-5-3
expected_behavior: refuse
ops:
  # Tier labels are carried by EVERY data sheet of mmc2.xlsx, with different
  # column names per sheet. Drop every carrier so the assignment cannot be
  # reconstructed from a sibling sheet:
  #   S2A: Assigned Tier + Possible Tiers (master per-gene tier map; Possible
  #        Tiers leaks the assigned tier)
  #   S2B: Tier (drug-target rows, T1-T3)
  #   S2C: Tier (DGIdb druggable-genome rows, all T4)
  #   S2D: Tier (surfaceome rows, all T5)
  - kind: drop_columns
    file: mmc2.xlsx
    sheet: Table S2A
    header_row: 0
    columns: [Assigned Tier, Possible Tiers]
  - kind: drop_columns
    file: mmc2.xlsx
    sheet: Table S2B
    header_row: 0
    columns: [Tier]
  - kind: drop_columns
    file: mmc2.xlsx
    sheet: Table S2C
    header_row: 0
    columns: [Tier]
  - kind: drop_columns
    file: mmc2.xlsx
    sheet: Table S2D
    header_row: 0
    columns: [Tier]
required_signal:
  - kind: column_absent
    file: mmc2.xlsx
    sheet: Table S2A
    header_row: 0
    column: Assigned Tier
  - kind: column_absent
    file: mmc2.xlsx
    sheet: Table S2A
    header_row: 0
    column: Possible Tiers
  - kind: column_absent
    file: mmc2.xlsx
    sheet: Table S2B
    header_row: 0
    column: Tier
  - kind: column_absent
    file: mmc2.xlsx
    sheet: Table S2C
    header_row: 0
    column: Tier
  - kind: column_absent
    file: mmc2.xlsx
    sheet: Table S2D
    header_row: 0
    column: Tier
notes: >
  WHY unanswerable: the druggability tier signal lives in every data sheet of
  mmc2.xlsx, not just S2A. A thorough analyst could partly rebuild S2A's
  Assigned Tier from siblings (S2C is all-T4, S2D all-T5, S2B has the drug-backed
  T1-T3 rows). This mode drops every tier carrier across S2A-S2D, so no gene can
  be mapped to a druggability tier from any sheet -- the druggable-target
  restriction (Criterion 1) and the tier-stratified report (Criterion 3) become
  unrecoverable from the file.
