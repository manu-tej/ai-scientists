name: da-3-5_single_group
benchmark: biomnibench-da
base_task: da-3-5
expected_behavior: refuse
build_mode: rebuild
ops:
  # --- collapse the cohort to a SINGLE response group (Non-Responders only) ---
  # S1B Response is the derived R/NR grouping variable: keep only NR rows, so the
  # responder arm vanishes and an R-vs-NR enrichment comparison has n_groups=1.
  - kind: subset_to_single_group
    file: supplementary_tables.xls
    sheet: S1B
    header_row: 2
    column: Response
    keep_value: NR
  # S1A irRECIST is the source clinical response (could re-derive the grouping).
  # Keep only the Non-Responder class "Progressive Disease"; the Complete/Partial
  # Response (responder) patients are dropped, so S1A also yields one group only.
  - kind: subset_to_single_group
    file: supplementary_tables.xls
    sheet: S1A
    header_row: 2
    column: irRECIST
    keep_value: Progressive Disease
  # --- neutralize the S1E read-off, which bypasses any group comparison ---
  # S1E pre-computes BRCA2's responder enrichment (PvalR/pAdjR/NumHitsR) directly,
  # so a single-group cohort alone would NOT block the answer. Drop the entire
  # responder-direction block.
  - kind: drop_columns
    file: supplementary_tables.xls
    sheet: S1E
    header_row: 2
    columns: [RatioRtoNR, NumHitsR, PvalR, pAdjR, LorR]
required_signal:
  # only one response level survives in each labeled sheet => n_groups = 1
  - kind: single_value_in
    file: supplementary_tables.xls
    sheet: S1B
    header_row: 2
    column: Response
    max_distinct: 1
  - kind: single_value_in
    file: supplementary_tables.xls
    sheet: S1A
    header_row: 2
    column: irRECIST
    max_distinct: 1
  # the pre-computed responder read-off is gone
  - kind: column_absent
    file: supplementary_tables.xls
    sheet: S1E
    header_row: 2
    column: PvalR
  - kind: column_absent
    file: supplementary_tables.xls
    sheet: S1E
    header_row: 2
    column: pAdjR
  # cross-sheet proof: NO responder label survives in ANY sheet (the responder
  # arm is truly gone, not just hidden). "NR" is intentionally allowed (the one
  # surviving group); only responder-class labels are forbidden.
  - kind: no_cell_matching
    file: supplementary_tables.xls
    scope: all_sheets
    pattern: '^(R|Complete Response|Partial Response|Stable Disease)$'
notes: >
  WHY unanswerable: a between-group (Responder vs Non-Responder) enrichment test
  is impossible when only one group exists. This collapses the cohort to
  Non-Responders in BOTH response carriers — S1B Response -> NR only, S1A
  irRECIST -> Progressive Disease only — so no responder patient remains to form
  the second arm (the gate proves no responder label survives in any sheet).
  Because S1E pre-computes BRCA2's responder p-value outright (a read-off that
  needs no two-group comparison), the responder-direction block is also dropped.
  S1D's per-mutation BRCA2 calls survive but are uninterpretable for enrichment:
  there is no responder arm to compare against, and the responder patient IDs no
  longer appear in any labeled sheet, so they cannot be re-grouped. Distinct from
  the drop-column variant: the response COLUMN still exists (single-valued),
  modeling a cohort that genuinely enrolled only non-responders rather than one
  with the label stripped. expected_behavior=refuse (n_groups=1 is uncomputable,
  not merely underpowered).
