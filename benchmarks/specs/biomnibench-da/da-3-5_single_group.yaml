name: da-3-5_single_group
benchmark: biomnibench-da
base_task: da-3-5
expected_behavior: refuse
build_mode: validate_existing   # .xls write unsupported (openpyxl cannot rewrite .xls); proven by audit
required_signal:
  # Single-group collapse: subset the cohort to Responders only, so the R-vs-NR
  # enrichment comparison has n_groups=1 and is uncomputable. To genuinely block
  # the answer this must hold across EVERY sheet of supplementary_tables.xls:
  #   - no Non-Responder label survives anywhere (S1A irRECIST "Progressive
  #     Disease"/"Stable Disease"; S1B Response "NR"), AND
  #   - the S1E pre-computed enrichment (which states BRCA2's responder p-value
  #     outright, bypassing any need for a two-group comparison) is also gone —
  #     i.e. the BRCA2 gene label must not appear.
  # Subsetting only S1D/S1B but leaving S1A's irRECIST or S1E's BRCA2 row intact
  # would leak the grouping or the answer, so the gate scans all cells of all
  # sheets.
  - kind: no_cell_matching
    file: supplementary_tables.xls
    scope: all_sheets
    pattern: '(?i)^(NR|Progressive Disease|Stable Disease|irRECIST|BRCA2)$'
notes: >
  KNOWN-INVALID (EXCLUDED from the refusal metric). Same root cause as
  da-3-5_drop_response_and_brca2: every answer-critical carrier (S1A irRECIST
  response, S1D per-mutation calls, S1E pre-computed BRCA2 enrichment) is inside
  supplementary_tables.xls, which is read-only in the pipeline — adapters.py
  raises UnsupportedFormat on any .xls write (keep_rows_where, used by
  subset_to_single_group, rejects). Even a hypothetical single-group subset of
  S1D/S1B would not block the answer because S1A still lists every patient's
  irRECIST class (the R/NR grouping is fully reconstructable) and S1E states
  BRCA2's responder p-value directly without needing any two-group test. The only
  writable files (CGAN_mmc3.xlsx, Hodis_mmc2.txt) hold no answer-critical signal
  (background cohorts only). No clean gated variant is achievable until an
  .xls-write (or xls->xlsx) adapter exists. Flagged invalid; EXCLUDED. Verify the
  gate with:
  uv run python scripts/build_variants.py --only da-3-5_single_group
