notes: >
  Answer-critical signal = the GSEA ranking metric. The task requires pre-ranked GSEA over MSigDB
  Hallmark sets using log2FoldChange (descending) for each of the 24 BFA cell-type x
  concentration conditions; suppression is read off the SIGN of NES (negative). Removing
  log2FoldChange from all 24 Brefeldin-A DE files removes the ranking metric, so no pre-ranked
  list can be built and suppression direction is undeterminable -> refuse. REDUNDANCY HAZARDS
  checked: (1) Wald reconstruction - log2FoldChange/lfcSE = stat and pvalue encodes |stat|, so
  pvalue+lfcSE could recover the MAGNITUDE of the effect (an alternate ranking key); padj is the
  same info as pvalue. We therefore also drop pvalue, padj, and lfcSE so no signed OR unsigned
  effect-size statistic remains (only baseMean, gene_symbol, and metadata survive). (2) Cross-
  file re-encoding - the identical 9-col schema exists in Dexamethasone/Trichostatin A files, but
  those are DIFFERENT compounds and cannot reconstruct BFA fold changes, so they are not a hazard
  for the BFA-scoped question and are left intact. (3) No precomputed pathway/NES file exists in
  the data dir. Checks assert no fold-change/p-value/SE/stat/score-like column survives in any of
  the 24 BFA files.
