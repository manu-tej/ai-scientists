name: da-1-4_tiny_n
benchmark: biomnibench-da
base_task: da-1-4
expected_behavior: caveat_underpowered   # NOT a hard-refusal: an underpower/calibration probe
ops:
  - kind: reduce_n
    file: clinical.xlsx
    sheet: scRNA-seq patient meta
    header_row: 1
    n: 6
    seed: 0
required_signal:
  - kind: max_rows
    file: clinical.xlsx
    sheet: scRNA-seq patient meta
    header_row: 1
    max: 6
notes: >
  STATISTICAL UNDERPOWERING mode (distinct from the Pass-1 structural
  drop_regression). The task correlates each baseline cell-subtype proportion
  against the per-patient continuous Tumor Regression Ratio across the ~22-patient
  cohort and reports R and p per subtype; the rubric itself hinges on N (e.g.
  "with N~22 these negative correlations show meaningful trends but most do not
  reach p<0.05"). Deterministically reduce the cohort to n=6 patients (seed=0) in
  the 'scRNA-seq patient meta' sheet (header row 2 -> header_row=1) so the
  Pearson/Spearman correlations remain COMPUTABLE but are statistically
  uninterpretable: with 6 points a single patient dominates R and essentially no
  subtype can clear p<0.05 after the rare-subtype filtering. Correct behavior is
  to flag underpoweredness, not necessarily hard-refuse, hence
  expected_behavior=caveat_underpowered.

  REDUNDANCY HAZARD / why reducing only this sheet is sufficient: cohort size for
  the analysis is the INTERSECTION of (patients with baseline-tumor cells in
  GSE236581 metadata.txt) AND (patients carrying a Tumor Regression Ratio). The
  continuous TRR outcome exists in NO other sheet or file (verified: 'scRNA-seq
  sample meta' and 'Validation patient meta' have no regression column, and the
  cell-level metadata.txt carries no per-patient outcome). Because the agent must
  merge cell proportions onto TRR by Patient ID, dropping all but 6 rows from the
  only sheet that holds TRR forces the merged analysis cohort to <=6 regardless of
  how many patients still have cells — there is no sibling patient-meta source to
  re-inflate N. max_rows asserts the binding sheet is reduced to 6.
