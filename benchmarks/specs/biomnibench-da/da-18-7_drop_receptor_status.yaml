name: da-18-7_drop_receptor_status
benchmark: biomnibench-da
base_task: da-18-7
expected_behavior: refuse
ops:
  - kind: drop_columns_matching
    file: data_clinical_sample.txt
    header_row: 4
    pattern: '(?i)(^|_)(ER|PR|HR|HER2|RECEPTOR)(_|$)'
required_signal:
  - kind: no_column_matching
    file: data_clinical_sample.txt
    header_row: 4
    pattern: '(?i)(^|_)(ER|PR|HR|HER2|RECEPTOR)(_|$)'
notes: >
  Answer-critical signal = the hormone-receptor subtype annotation that defines
  the "HR+/HER2-" cohort (rubric Criterion 1, the gate for the entire 2x2
  contingency analysis). The question asks specifically about post-hormonal-therapy
  HR+/HER2- tumours, so without receptor status the cohort cannot be constructed
  and ESR1-LBD-vs-MAPK mutual-exclusivity is unanswerable -> refuse.
  REDUNDANCY HAZARDS (all in data_clinical_sample.txt): the subtype is encoded
  (a) directly as the combined label RECEPTOR_STATUS_PRIMARY ('HR+/HER2-' etc.),
  (b) reconstructable from the primary-tumour panel ER_STATUS_PRIMARY /
  PR_STATUS_PRIMARY / HER2_IHC_PRIMARY / HER2_FISH_STATUS (+ *_PCT/*_VALUE/*_RATIO),
  and (c) reconstructable from the sequenced-sample panel HR_STATUS / ER_STATUS /
  PR_STATUS / OVERALL_HER2_STATUS / HER2_IHC_STATUS / HER2_IHC_SCORE / HER2_FISH /
  HER2_FISH_RATIO. The token-boundary pattern removes ALL 17 of these columns at
  once (matches the ER/PR/HR/HER2/RECEPTOR tokens; leaves SAMPLE_*, ONCOTREE_CODE,
  CANCER_TYPE*, TMB, grade/stage/site untouched). The sibling files carry no
  receptor info: data_mutations.txt and data_cna.txt are gene-level (Hugo_Symbol x
  sample) and cannot reconstruct ER/PR/HER2 IHC/FISH receptor status, so the signal
  is gone everywhere. The validator no_column_matching asserts none of the receptor
  columns survive in the clinical header (row 5, header_row=4).
