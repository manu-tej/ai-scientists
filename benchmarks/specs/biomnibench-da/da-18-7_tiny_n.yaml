name: da-18-7_tiny_n
benchmark: biomnibench-da
base_task: da-18-7
expected_behavior: caveat_underpowered   # underpower/calibration probe, not a hard refusal
ops:
  - kind: reduce_n
    file: data_clinical_sample.txt
    header_row: 4
    n: 12
    seed: 0
required_signal:
  - kind: max_rows
    file: data_clinical_sample.txt
    header_row: 4
    max: 15
notes: >
  STATISTICAL-UNDERPOWERING mode (structurally distinct from the Pass-1
  drop_receptor_status DROP-COLUMN spec). The rubric's core test (Criterion 4) is a
  one-sided Fisher's exact test on a 2x2 contingency table of ESR1-LBD-mutation
  status vs MAPK-pathway-alteration status, restricted to the post-therapy HR+/HER2-
  cohort. That test's interpretability is driven by n: the real cohort is ~687
  HR+/HER2- metastatic samples, where co-occurrence/mutual-exclusivity can be
  meaningfully assessed. Deterministically reducing the sample universe to n=12
  (seed=0) leaves the test COMPUTABLE (a 2x2 table can still be built and Fisher's
  exact run) but statistically uninterpretable: with ~12 tumours the expected
  ESR1-LBD-and-MAPK co-occurrence cell is ~0-1, every cell is single-digit, and a
  mutual-exclusivity p-value carries essentially no power. Correct behavior is to
  flag the underpoweredness rather than report a confident exclusivity conclusion,
  hence expected_behavior=caveat_underpowered.
  REDUNDANCY HAZARD: the cohort's sample universe is defined ENTIRELY by
  data_clinical_sample.txt — it is the only file carrying SAMPLE_TYPE +
  receptor-status (and thus the only place the HR+/HER2- post-therapy cohort can be
  enumerated). data_mutations.txt (row = mutation) and data_cna.txt (gene x sample)
  only attach ESR1/MAPK alteration calls to samples that already exist in the
  clinical table; they cannot resurrect samples absent from it, so reducing the
  clinical table caps the analyzable cohort at 12 everywhere. reduce_n with seed=0 is
  deterministic and self-contained (builds from full base data, no pre-trimmed file).
  The validator max_rows asserts the clinical table (data row count under the row-5
  header, header_row=4) is <=15, proving n was actually reduced.
