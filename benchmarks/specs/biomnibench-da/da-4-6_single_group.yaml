name: da-4-6_single_group
benchmark: biomnibench-da
base_task: da-4-6
expected_behavior: refuse
ops:
  - kind: subset_to_single_group
    file: mmc5.csv
    header_row: 0
    column: 'Pathological Response'
    keep_value: 'non-MPR'
required_signal:
  # The categorical comparison is MPR vs non-MPR (Cox uses MPR as the reference;
  # KM compares 3 groups: MPR, high-Texp non-MPR, low-Texp non-MPR). After
  # subsetting rows to non-MPR only, the MPR reference group is gone EVERYWHERE.
  - kind: single_value_in
    file: mmc5.csv
    column: 'Pathological Response'
    max_distinct: 1
  # REDUNDANCY HAZARD: response status is re-encoded in several sibling columns.
  # The row-subset removes all 89 MPR/pCR rows at once, so each re-encoding is
  # also collapsed. Prove the MPR/responder level is absent in every one.
  - kind: single_value_in
    file: mmc5.csv
    column: 'MPR'
    max_distinct: 1
  - kind: single_value_in
    file: mmc5.csv
    column: 'pCR'
    max_distinct: 1
  # PRR_group {pCR,pPR,nPR,MPR}: pCR and MPR are the responder (MPR) categories;
  # after subset only the non-MPR sub-labels {pPR,nPR} survive. No 'pCR'/'MPR'.
  - kind: no_value_matching
    file: mmc5.csv
    column: 'PRR_group'
    pattern: '^(pCR|MPR)$'
  # PRR*0.1 is a continuous re-encoding (MPR responders ~9.9-10.0 vs non-MPR
  # <=8.8; a threshold at 9 would reconstruct the split). It is NOT guarded by a
  # cell check because no_cell_matching scans the whole CSV file-wide (scope is
  # ignored for non-Excel), so other columns' legitimate 9.x/10.0 values (module
  # scores, abundances, the Texp *10 metric) would false-trip it. The guard is
  # STRUCTURAL instead: subset_to_single_group is a ROW op, so after it every row
  # is non-MPR and PRR*0.1's MPR-level values (>=9) are entirely gone (verified:
  # post-subset max = 8.8, zero rows >=9). With no MPR row anywhere in the file,
  # no continuous proxy can rebuild an MPR arm that no longer exists.
notes: >
  SINGLE-GROUP COLLAPSE mode (distinct from the Pass-1 drop_texp / DROP-COLUMN).
  The task's core is a categorical group comparison: stratify into MPR (reference),
  high-Texp non-MPR, and low-Texp non-MPR, then quantify the proportion of non-MPR
  patients whose survival is "comparable to MPR" (rubric Criteria 1, 3, 4, 5; Cox
  with MPR as the explicit reference). Collapsing the cohort to non-MPR ONLY (70 of
  159 rows; the 89 MPR/pCR rows removed) destroys the reference arm, so the
  MPR-vs-non-MPR log-rank tests, the Cox HRs vs MPR, and the "MPR-like proportion"
  claim are all impossible. The within-non-MPR high/low Texp split could still be
  computed, but the question explicitly asks which non-MPR patients have survival
  that PREDICTS FAVORABLE RFS comparable to responders -- with no MPR arm there is
  no benchmark to compare against, so the question is unanswerable.
  REDUNDANCY HAZARD: response/MPR status is re-encoded in five places --
  'Pathological Response' {non-MPR,pCR,MPR}, 'MPR' {MPR,non-MPR}, 'pCR'
  {pCR,non-pCR}, the ordinal 'PRR_group' {pCR,pPR,nPR,MPR}, and the continuous
  'PRR*0.1' (MPR responders ~9.9-10.0 vs non-MPR <=8.8, threshold at 9 recovers the
  split). Because subset_to_single_group is a ROW operation, removing the 89
  responder rows collapses every one of these simultaneously: MPR/pCR/PRR_group
  retain only non-MPR-consistent levels and PRR*0.1 loses all >=9 values. The four
  categorical/ordinal checks prove the MPR reference is gone everywhere; PRR*0.1 is
  guarded structurally by the row subset (no MPR row survives, so its continuous
  values cannot rebuild the arm; no_cell_matching is unusable here because it scans
  the CSV file-wide and would false-trip on legitimate 9.x/10.0 values in module
  scores / abundances / the Texp *10 metric). No sibling column can reconstruct the
  MPR reference. mmc5.csv is the only data file (the rubric's mmc1.csv is not in
  the dataset).
