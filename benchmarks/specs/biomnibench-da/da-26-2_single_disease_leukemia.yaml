name: da-26-2_single_disease_leukemia
benchmark: biomnibench-da
base_task: da-26-2
expected_behavior: refuse
ops:
  - kind: subset_to_single_group
    file: sub_CCLE_TCGA_ID_meta.csv
    column: disease
    keep_value: Leukemia
  - kind: subset_to_single_group
    file: sub_CCLE_TCGA_ID_meta.csv
    column: lineage
    keep_value: blood
required_signal:
  - kind: single_value_in
    file: sub_CCLE_TCGA_ID_meta.csv
    column: disease
    max_distinct: 1
  - kind: no_value_matching
    file: sub_CCLE_TCGA_ID_meta.csv
    column: disease
    pattern: '(?i)breast'
  - kind: no_value_matching
    file: sub_CCLE_TCGA_ID_meta.csv
    column: lineage
    pattern: '(?i)breast'
notes: >
  WHY unanswerable (cell-line side): single-group collapse of the metadata to a
  NON-breast cohort. The question is explicitly about BRCA (rubric Crit 8 =
  isolate Breast Cancer samples). Subsetting the ID-meta to only Leukemia / blood
  removes every Breast Cancer row, so the metadata can no longer label any CCLE
  cell line as breast. disease and lineage are collinear and both are collapsed;
  collapsing also eliminates the `sampleID_CCLE_Name` tissue-token leak (verified:
  0 `_BREAST` values survive the Leukemia collapse). The only remaining CL key is
  the opaque ACH-###### accession, so CCLE breast cell lines cannot be isolated.
  KNOWN RESIDUAL LEAK (not gateable with current ops): subset_to_single_group
  edits ONLY this CSV; the builder hardlinks the data tree and copy-on-writes only
  files an op names, so sub_TCGA_depmapscore.txt / sub_TCGA_exp.txt keep ALL
  patient samples, and their matrix *column headers* are full TCGA barcodes
  (TCGA-BH-..., TCGA-A2-...). Those barcodes are the gene x sample join key (not a
  meta column) and the TSS code (chars 6-7) maps 1:1 to disease via the public GDC
  TSS table, so a model can still isolate BRCA *patients* with external knowledge
  the instruction permits. Blocks the CL-BRCA half only; full BRCA neutralization
  is NOT achievable with the current op/check set (would need a row-subset op that
  also prunes matrix columns, or barcode anonymization that preserves the join).
