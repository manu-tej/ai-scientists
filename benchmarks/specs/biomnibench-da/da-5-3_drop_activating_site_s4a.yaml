name: da-5-3_drop_activating_site_s4a
benchmark: biomnibench-da
base_task: da-5-3
expected_behavior: refuse
ops:
  # The question is specifically about ACTIVATING phosphosites. The rubric makes
  # the `ActivatingSite == 1` filter mandatory (Criterion 1 [A]); it is what
  # reduces 18,169 -> 229 sites before druggability/dependency filtering. The
  # `ActivatingSite` column in S4A is the ONLY carrier of this annotation: the
  # trailing '|1' token in Phosphosite ID is a constant (1 for all 18,169 rows)
  # and does NOT encode activating status, and no other local column reproduces
  # it. Dropping it removes the activating-vs-passenger distinction entirely.
  - kind: drop_columns
    file: mmc4.xlsx
    sheet: Table S4A
    header_row: 0
    columns: [ActivatingSite]
required_signal:
  - kind: column_absent
    file: mmc4.xlsx
    sheet: Table S4A
    header_row: 0
    column: ActivatingSite
notes: >
  WHY unanswerable: the task asks for ACTIVATING phosphosites; the answer requires
  filtering S4A to ActivatingSite == 1 (229 of 18,169 sites) before any druggability
  or dependency logic. `ActivatingSite` is the sole carrier of that annotation —
  the Phosphosite ID's trailing token is a constant 1 for every row (verified) and
  does not leak it, and no sibling column (Tier, cohort flags, Family) distinguishes
  activating from passenger sites. The instruction forbids consulting the source
  paper / PhosphoSitePlus to re-curate activating status, so with the column gone
  the activating-site universe cannot be reconstructed from the provided data and
  Criterion 1 ([A] requires the ActivatingSite == 1 filter) cannot be met. The
  signal is exclusive to S4A in mmc4.xlsx; mmc2.xlsx contains no phosphosite-level
  activating annotation, so this single-file perturbation blocks the answer across
  both files.
