name: da-3-5_drop_significance_all_sheets
benchmark: biomnibench-da
base_task: da-3-5
expected_behavior: refuse
ops:
  - kind: drop_columns_matching
    file: CGAN_mmc3.xlsx
    scope: all_sheets
    header_row: 1
    pattern: '(?i)^(rank|p|q|p_clust|p_cons|p_joint|p_cv|p\.bonferroni)$'
required_signal:
  - kind: no_column_matching
    file: CGAN_mmc3.xlsx
    scope: all_sheets
    header_row: 1
    pattern: '(?i)^(rank|p|q|p_clust|p_cons|p_joint|p_cv|p\.bonferroni)$'
notes: >
  WHY unanswerable (for the CGAN background path): mutation significance is
  re-encoded across every sheet of CGAN_mmc3 — S2A/S2B carry p/p_cv/p_joint/q,
  S2C/S2D carry P/P.Bonferroni/Q (InVEx), and rank/Rank order genes by
  significance. Dropping the significance/ranking columns in only one sheet leaks
  the answer via a sibling sheet. scope=all_sheets removes every p-value, q-value,
  and rank column across all five sheets, so NO sheet can tell which TCGA genes
  are significantly mutated — the external-background significance reference
  (rubric Criterion 5(c)) is gone everywhere.
