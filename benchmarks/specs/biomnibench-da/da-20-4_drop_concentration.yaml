name: da-20-4_drop_concentration
benchmark: biomnibench-da
base_task: da-20-4
expected_behavior: refuse
ops:
  # Dose lives in compound_concentration; percent_volume_dmso is the per-dose DMSO
  # match key (0.0625 / 0.1875 / 0.625); condition embeds the dose in its string
  # ("...-Dabrafenib-900-24"). Drop all three (anonymize_column is h5ad-only).
  - kind: drop_columns
    file: Metadata.csv
    header_row: 0
    columns: ["compound_concentration", "percent_volume_dmso", "condition"]
required_signal:
  - kind: column_absent
    file: Metadata.csv
    column: compound_concentration
  - kind: column_absent
    file: Metadata.csv
    column: percent_volume_dmso
  - kind: column_absent
    file: Metadata.csv
    column: condition
notes: >
  WHY unanswerable: the rubric requires NES interpreted across the 6-point
  log-dilution series (9.5..3000 nM) per cell type, with DMSO controls matched on
  `percent_volume_dmso`. Dropping `compound_concentration` + `percent_volume_dmso`
  + `condition` (which embeds the dose) removes every dose and dose-matched-control
  label, so the dose-dependent, volume-matched analysis the answer keys on cannot
  be performed.
