name: da-3-5_drop_gene_key
benchmark: biomnibench-da
base_task: da-3-5
expected_behavior: refuse
ops:
  - kind: drop_columns_matching
    file: CGAN_mmc3.xlsx
    scope: all_sheets
    header_row: 1
    pattern: '(?i)^gene$'
required_signal:
  - kind: no_column_matching
    file: CGAN_mmc3.xlsx
    scope: all_sheets
    header_row: 1
    pattern: '(?i)^gene$'
notes: >
  WHY unanswerable (for the CGAN background path): every CGAN sheet keys its
  significance/recurrence rows on the HGNC `gene`/`Gene` symbol — that column is
  the only join key linking TCGA background significance to the Hugo cohort genes
  (e.g. BRCA2). Dropping `gene`/`Gene` across all sheets leaves significance and
  count columns with no gene labels, so the background table cannot be mapped to
  any responder-enriched gene. The external-background comparison the rubric's
  Criterion 5(c) calls for becomes impossible — there is no gene to compare.
