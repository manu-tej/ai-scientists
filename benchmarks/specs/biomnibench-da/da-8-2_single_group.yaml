name: da-8-2_single_group
benchmark: biomnibench-da
base_task: da-8-2
expected_behavior: refuse
ops:
  - kind: subset_to_single_group
    file: data_cgm.csv
    column: mitigator
    keep_value: Protein
required_signal:
  - kind: single_value_in
    file: data_cgm.csv
    column: mitigator
    max_distinct: 1
  - kind: no_value_matching
    file: data_cgm.csv
    column: foods
    pattern: '(?i)fiber|fibre|\+fat'
  - kind: no_cell_matching
    file: data_cgm.csv
    pattern: '(?i)fiber|fibre'
notes: >
  STRUCTURALLY DISTINCT from da-8-2_drop_mitigator (which removes the entire
  preload column). Here the `condition` factor SURVIVES as a column but is
  collapsed to a SINGLE group: only Protein-preloaded rows are kept, so the
  comparator arm (Fiber-preloaded rice) no longer exists. The task's core is a
  two-way ANOVA `peak_diff ~ C(condition) * C(IR_status)` whose `condition`
  factor must contrast Protein vs Fiber; with only one preload group there is no
  Fiber-minus-Protein reduction to compute per subject and the condition main
  effect and the condition x IR_status interaction are both undefined. IR status
  (DI/SSPG in data_meta.csv) is left fully intact — this is single-GROUP
  collapse of the comparison axis, not removal of the moderator.
  REDUNDANCY HAZARD: collapsing `mitigator` to Protein is not enough on its own
  because `foods` re-encodes the preload verbatim as Rice+Fiber / Rice+Fat /
  Rice+Protein. After subset_to_single_group keeps only mitigator==Protein, the
  surviving `foods` values are exclusively the +Protein variants (Rice+Protein,
  Bread+Protein, ...), so no Fiber/Fat arm can be recovered from `foods` either.
  The checks prove this everywhere: single_value_in confirms mitigator has 1
  level; no_value_matching confirms `foods` carries no Fiber/Fat token; the
  whole-file no_cell_matching scan confirms no Fiber/Fibre string survives
  anywhere in the perturbed CGM file (Olink carries no preload tokens). Thus the
  Protein-vs-Fiber contrast cannot be reconstructed from any surviving signal.
