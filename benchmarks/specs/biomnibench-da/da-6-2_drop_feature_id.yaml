name: da-6-2_drop_feature_id
benchmark: biomnibench-da
base_task: da-6-2
expected_behavior: refuse
ops:
  - kind: drop_columns
    file: paper_deg.xlsx
    sheet: "2 - Training-regulated features"
    header_row: 18
    columns: [feature, feature_ID, non_redundant_feature_ID]
required_signal:
  - kind: no_column_matching
    file: paper_deg.xlsx
    sheet: "2 - Training-regulated features"
    header_row: 18
    pattern: '(?i)feature'
notes: >
  WHY unanswerable: Criteria 5 and 6 require naming specific genes for the top
  ranked patterns and grounding the biological interpretation in real gene
  symbols (e.g. mitochondrial / oxidative-phosphorylation genes). The per-row
  gene/feature key lives only in feature, feature_ID and non_redundant_feature_ID;
  every other column (assay/tissue/sex/timepoint/logFC/p/q) is a grouping or
  statistic shared across thousands of features. Drop all three identity columns
  and the rows become anonymous measurements: patterns can still be counted in
  the abstract but no gene can be named, so the answer cannot satisfy the
  named-entity ranking and interpretation the rubric scores.
