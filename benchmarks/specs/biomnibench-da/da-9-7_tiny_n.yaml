name: da-9-7_tiny_n
benchmark: biomnibench-da
base_task: da-9-7
expected_behavior: caveat_underpowered   # NOT a hard-refusal: an underpower/calibration probe
ops:
  - kind: reduce_n
    file: NatureMed_CyTOF_metadata.csv
    header_row: 0
    n: 25
    seed: 0
required_signal:
  - kind: max_rows
    file: NatureMed_CyTOF_metadata.csv
    header_row: 0
    max: 30
notes: >
  STATISTICAL UNDERPOWERING mode (structurally distinct from the Pass-1
  da-9-7_drop_timepoint, which is a DROP-COLUMN of the answer-critical timepoint).
  Here the timepoint column is left intact; instead the CyTOF sample roster is
  deterministically subsampled to n=25 rows (seed=0) across all visits. The
  cross-platform Spearman correlation at C2D1 hinges on the matched-patient cohort,
  which is the INTERSECTION of patients with a C2D1 sample in BOTH the CyTOF and
  Olink metadata (~73 patients at full data). The CyTOF metadata is the binding
  bottleneck (73 C2D1 patients vs Olink's 90). Cutting the CyTOF roster to n=25
  leaves only ~7-8 CyTOF samples at C2D1, so the matched cohort collapses to ~8
  patients. With ~8 patients the 12 CyTOF×Olink pairs are still COMPUTABLE (Spearman
   rho runs) but statistically uninterpretable: per-arm strata fall to n=2-3 (below
  the rubric's own n>=8 pooled / n>=10 thresholds), every BH-FDR family is dominated
  by sampling noise, and the rubric's Arm-C2 finding (rho ~ -0.627, q ~ 0.037) cannot
  be reproduced or trusted. Correct behavior is to flag underpoweredness, not
  necessarily hard-refuse -> expected_behavior=caveat_underpowered.
  REDUNDANCY HAZARD ruled out: the matched n is gated SOLELY by which sample.id rows
  survive in NatureMed_CyTOF_metadata.csv, because a CyTOF cell-population value
  (in NatureMed_CyTOF_select_cell_populations.csv) is unusable for the C2D1
  correlation unless the metadata maps its sample.id to BOTH the C2D1 timepoint and
  a Deidentified.ID. The measurement file carries no timepoint or patient key, so
  its 1,633 surviving value rows cannot resurrect dropped patients. Leaving the Olink
  side at full size does not help: the correlation needs paired CyTOF+Olink per
  patient, and the cap on matched n is set by the smaller CyTOF survivor set.
  Self-contained: builds from full base data via reduce_n, then proves smallness via
  max_rows (n<=30) on the CyTOF metadata; regenerable without any pre-trimmed file.
