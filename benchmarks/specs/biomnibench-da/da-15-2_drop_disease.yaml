name: da-15-2_drop_disease
benchmark: biomnibench-da
base_task: da-15-2
expected_behavior: refuse
ops:
  # Disease label (ALS vs Control) is carried redundantly by `disease` and
  # `subject_group` in ALL THREE regional metadata files. Drop both, plus the
  # ALS-only clinical fields that re-encode disease status:
  #   - site_of_motor_onset: "Not Applicable" is a near-pure control marker
  #   - disease_duration:    populated for ALS, ~all NaN for controls
  #   - mutations:           populated only for ALS, all-NaN for controls
  - kind: drop_columns
    file: Cervical_Spinal_Cord_metadata.tsv.gz
    columns: [disease, subject_group, site_of_motor_onset, disease_duration, mutations]
    header_row: 0
  - kind: drop_columns
    file: Lumbar_Spinal_Cord_metadata.tsv.gz
    columns: [disease, subject_group, site_of_motor_onset, disease_duration, mutations]
    header_row: 0
  - kind: drop_columns
    file: Thoracic_Spinal_Cord_metadata.tsv.gz
    columns: [disease, subject_group, site_of_motor_onset, disease_duration, mutations]
    header_row: 0
required_signal:
  # Disease label gone from every region the WGCNA cohort is drawn from.
  - kind: column_absent
    file: Cervical_Spinal_Cord_metadata.tsv.gz
    column: disease
  - kind: column_absent
    file: Cervical_Spinal_Cord_metadata.tsv.gz
    column: subject_group
  - kind: column_absent
    file: Cervical_Spinal_Cord_metadata.tsv.gz
    column: site_of_motor_onset
  - kind: column_absent
    file: Cervical_Spinal_Cord_metadata.tsv.gz
    column: mutations
  - kind: column_absent
    file: Lumbar_Spinal_Cord_metadata.tsv.gz
    column: disease
  - kind: column_absent
    file: Lumbar_Spinal_Cord_metadata.tsv.gz
    column: subject_group
  - kind: column_absent
    file: Lumbar_Spinal_Cord_metadata.tsv.gz
    column: site_of_motor_onset
  - kind: column_absent
    file: Lumbar_Spinal_Cord_metadata.tsv.gz
    column: mutations
  - kind: column_absent
    file: Thoracic_Spinal_Cord_metadata.tsv.gz
    column: disease
  - kind: column_absent
    file: Thoracic_Spinal_Cord_metadata.tsv.gz
    column: subject_group
  - kind: column_absent
    file: Thoracic_Spinal_Cord_metadata.tsv.gz
    column: site_of_motor_onset
  - kind: column_absent
    file: Thoracic_Spinal_Cord_metadata.tsv.gz
    column: mutations
notes: >
  WHY unanswerable: the rubric (Criterion 1, 15 pts) demands WGCNA be run on
  ALS samples ONLY. The ALS-vs-control label lives in `disease` and the parallel
  `subject_group` column across all three spinal-cord regions; dropping both in
  every file makes ALS-only subsetting impossible. Also drops the ALS-only
  clinical fields (site_of_motor_onset's "Not Applicable" control marker,
  disease_duration, mutations) that would otherwise let a model reconstruct
  disease status. c9orf72_repeat_size is all-NaN (no signal) so it is left as-is.
