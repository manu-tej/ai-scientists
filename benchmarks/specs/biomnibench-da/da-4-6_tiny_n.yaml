name: da-4-6_tiny_n
benchmark: biomnibench-da
base_task: da-4-6
expected_behavior: caveat_underpowered   # NOT a hard-refusal: an underpower/calibration probe
ops:
  - kind: reduce_n
    file: mmc5.csv
    header_row: 0
    n: 12
    seed: 0
required_signal:
  - kind: max_rows
    file: mmc5.csv
    header_row: 0
    max: 15
notes: >
  STATISTICAL UNDERPOWERING mode (distinct from Pass-1 drop_texp / DROP-COLUMN and
  from single_group). Deterministically reduce the 159-patient cohort to n=12
  (seed=0). The task fits Kaplan-Meier + log-rank tests across THREE groups (MPR,
  high-Texp non-MPR, low-Texp non-MPR) and a Cox PH model with HRs and 95% CIs
  (rubric Criteria 3 and 4) -- all acutely n-sensitive. The full cohort has only
  31 recurrence events (22 in non-MPR); at n=12 the expected event count drops to
  ~2-3 and must be split across three arms after a within-non-MPR median Texp
  stratification, so per-arm n and event counts collapse to ~0-1. The log-rank and
  Cox computations remain COMPUTABLE but are statistically uninterpretable
  (separation / near-infinite HRs / CIs spanning orders of magnitude), and the
  "proportion of non-MPR patients with MPR-like survival" cannot be estimated with
  any confidence. Correct behavior is to flag the underpoweredness rather than
  hard-refuse, hence expected_behavior=caveat_underpowered. Self-contained:
  rebuilds from full base data via reduce_n then proves smallness via max_rows.
