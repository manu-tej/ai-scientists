name: da-6-5_drop_significance
benchmark: biomnibench-da
base_task: da-6-5
expected_behavior: refuse
ops:
  - kind: drop_columns
    file: paper_deg.xlsx
    sheet: "2 - Training-regulated features"
    header_row: 18
    columns: [training_q, training_p_value]
required_signal:
  - kind: column_absent
    file: paper_deg.xlsx
    sheet: "2 - Training-regulated features"
    header_row: 18
    column: training_q
  - kind: column_absent
    file: paper_deg.xlsx
    sheet: "2 - Training-regulated features"
    header_row: 18
    column: training_p_value
notes: >
  WHY unanswerable: Rubric Criterion 2 (20 pts) requires defining training-regulated
  features at 5% FDR via training_q < 0.05. Dropping training_q removes the FDR signal;
  also dropping training_p_value prevents re-deriving an FDR cutoff. Without a defensible
  significance filter, the per-(tissue,assay) feature sets that feed every downstream
  similarity/aggregation step cannot be constructed.
