name: da-1-3_drop_tissue
benchmark: biomnibench-da
base_task: da-1-3
expected_behavior: refuse
# NOTE on this file: GSE236581_CRC-ICB_metadata.txt is an R write.table dump whose
# header has 9 names but each data row has 10 fields (an unnamed leading row-name =
# cell barcode). The whitespace-delimited adapter therefore maps each HEADER NAME to
# the data column ONE position to its right. Verified mapping (header-name -> data):
#   orig.ident   -> barcode row-name (CRC01-B-III_AAAC...)   [tissue+stage leak]
#   Patient      -> sample Ident      (CRC01-N-I)             [tissue+stage leak]
#   MajorCellType-> Tissue            (Tumor/Normal/Blood/LN/TN)  [THE signal]
#   SubCellType  -> MajorCellType     (Epi/T/B/Mye/Stromal/ILC)
# The fine SubCellType (c64_Mph_SPP1 ...) sits in the unnamed 10th data field.
# So the tissue-compartment signal is carried by header-name MajorCellType, and is
# ALSO leaked by the sample id (Patient) and the barcode (orig.ident). All three must
# go. The gate uses no_cell_matching (scans every cell) to bypass the header offset.
ops:
  - kind: drop_columns
    file: GSE236581_CRC-ICB_metadata.txt
    columns: [MajorCellType, Patient, orig.ident]
required_signal:
  # No standalone tissue-compartment cell survives (anchored so it does NOT trip on
  # the legitimate cell-subtype label c91_Epi_Tumor, which contains the word "Tumor").
  - kind: no_cell_matching
    file: GSE236581_CRC-ICB_metadata.txt
    pattern: '^(Tumor|Normal|Blood|LN|TN)$'
  # No sample/barcode id leaking tissue (-T-/-N-/-B-) or treatment stage survives.
  - kind: no_cell_matching
    file: GSE236581_CRC-ICB_metadata.txt
    pattern: 'CRC\d+-[BNT]-(I|II|III|IV)'
notes: >
  WHY unanswerable: the rubric's entire analysis keys on the Tissue compartment
  (Tumor vs Normal-adjacent vs Blood) to compute per-subtype tissue enrichment
  (Ro/e) and identify tumor-specific cell populations. Dropping the Tissue column
  removes that axis; also dropping the sample Ident (CRC01-N-I) and the per-cell
  barcode row-name -- both of which encode the tissue letter (B/N/T) and treatment
  stage -- closes the only sibling leaks. With no tissue label and no recoverable
  tissue from any id, no cell can be assigned to a compartment, so the cross-tissue
  enrichment / tumor-specificity comparison (Criteria 1-6) is impossible.
