name: da-6-2_drop_significance
benchmark: biomnibench-da
base_task: da-6-2
expected_behavior: refuse
ops:
  - kind: drop_columns
    file: paper_deg.xlsx
    sheet: "2 - Training-regulated features"
    header_row: 18
    columns: [timewise_p_value, training_p_value, training_q, meta_reg_pvalue, meta_reg_het_p]
required_signal:
  - kind: no_column_matching
    file: paper_deg.xlsx
    sheet: "2 - Training-regulated features"
    header_row: 18
    pattern: '(?i)(p_value|pvalue|training_q)'
notes: >
  WHY unanswerable: Criterion 2 demands significance (training_q < 0.05 or
  equivalent) at ALL FOUR timepoints (1w/2w/4w/8w) per sex before any gene
  enters a pattern set; the whole completeness filter keys on a significance
  column. Drop training_q (the FDR the rubric names) plus every sibling that
  re-encodes significance: timewise_p_value, training_p_value, meta_reg_pvalue,
  meta_reg_het_p. With no p/q anywhere, the agent cannot decide which gene is
  significant at which timepoint, so the 4-timepoint completeness filter and the
  shared/sex-specific categorisation downstream of it are impossible. logFC
  remains (effect sizes are observable) but cannot be thresholded for significance.
