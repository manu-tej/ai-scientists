name: da-3-5_drop_significance
benchmark: biomnibench-da
base_task: da-3-5
expected_behavior: refuse
ops:
  - kind: drop_columns
    file: CGAN_mmc3.xlsx
    sheet: Supplemental Table S2A
    header_row: 1
    columns: [rank, p_clust, p_cons, p_joint, p_cv, p, q]
required_signal:
  - kind: column_absent
    file: CGAN_mmc3.xlsx
    sheet: Supplemental Table S2A
    header_row: 1
    column: q
  - kind: column_absent
    file: CGAN_mmc3.xlsx
    sheet: Supplemental Table S2A
    header_row: 1
    column: p
  - kind: column_absent
    file: CGAN_mmc3.xlsx
    sheet: Supplemental Table S2A
    header_row: 1
    column: rank
notes: >
  WHY unanswerable (for the CGAN background path): the key sheet S2A is the TCGA
  MutSig "Ranked List of Significantly Mutated Genes". Its significance/ranking
  columns (rank, p, p_cv, p_joint, q = MutSig FDR) are the only signal that says
  WHICH genes are significantly mutated in the TCGA melanoma background. Dropping
  them leaves only raw counts (N, n, npat) with no significance call, so S2A can
  no longer serve as the properly-matched external background the rubric's
  Criterion 5(c) requires for interpreting responder-enrichment vs the broader
  melanoma population.
