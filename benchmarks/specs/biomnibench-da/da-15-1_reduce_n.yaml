name: da-15-1_reduce_n
benchmark: biomnibench-da
base_task: da-15-1
expected_behavior: caveat_underpowered
ops:
  # Statistical underpowering: deterministically subsample the cervical cohort
  # from 174 samples down to 6. The ALS-vs-Control contrast remains COMPUTABLE
  # (the disease label and covariates are untouched) but is uninterpretable —
  # ~6 samples split across two groups and many technical/biological covariates
  # (sex, age, RIN, library_prep, gPC1-5, RNA-composition metrics) cannot
  # support a multiple-testing-corrected DE model. The model is overdetermined
  # and no gene survives FDR<0.05 with any reliability.
  - kind: reduce_n
    file: Cervical_Spinal_Cord_metadata.tsv.gz
    n: 6
    seed: 0
    header_row: 0
required_signal:
  - kind: max_rows
    file: Cervical_Spinal_Cord_metadata.tsv.gz
    max: 6
notes: >
  WHY underpowered (not refuse): the rubric (Criterion 3, 25 pts; Criterion 4,
  15 pts) demands normalization, variance modeling, FDR-corrected DE testing,
  and a count of significant DEGs, plus covariate adjustment (Criterion 2:
  sex, age, RIN, library_prep, site, genotype PCs). With only 6 samples the
  contrast is still computable but the covariate-adjusted model has near-zero
  residual degrees of freedom and the FDR-corrected DEG count is statistically
  meaningless. The correct response is to run the analysis and explicitly
  caveat that it is underpowered, not to refuse.
